<!doctype html>
<html lang="lt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pokalbis su seneliu</title>
    <meta
      name="description"
      content="Paprastas šeimos vaizdo pokalbis seneliams ir anūkams."
    >
    <link rel="stylesheet" href="style.css?v=20260615-avatars">
  </head>
  <body>
    <main class="app">
      <section class="welcome" id="welcome">
        <div class="brand">
          <p class="eyebrow">Šeimos kambarys</p>
          <h1>Pokalbis su seneliu</h1>
          <p class="subtitle">Pasirink, kam skambinti, ir įvesk šeimos slaptažodį.</p>
        </div>

        <div class="call-options" aria-label="Skambučio pasirinkimas">
          <button
            class="call-button"
            type="button"
            data-call-target="grandpa"
          >
            <img
              class="call-avatar"
              src="assets/grandpa.jpg"
              alt="Senelio nuotrauka"
            >
            <span class="call-label">Skambinti seneliui</span>
          </button>
          <button
            class="call-button call-button-alt"
            type="button"
            data-call-target="grandma"
          >
            <img
              class="call-avatar"
              src="assets/grandma.jpg"
              alt="Močiutės nuotrauka"
            >
            <span class="call-label">Skambinti močiutei</span>
          </button>
        </div>
      </section>

      <section class="call is-hidden" id="call" aria-label="Vaizdo skambutis">
        <div class="call-bar">
          <strong id="callTitle">Pokalbis su seneliu</strong>
          <button class="secondary-button" id="leaveCall" type="button">
            Baigti
          </button>
        </div>
        <div class="meet" id="meet"></div>
      </section>
    </main>

    <div
      aria-labelledby="passwordTitle"
      aria-modal="true"
      class="password-modal is-hidden"
      id="passwordModal"
      role="dialog"
    >
      <form class="password-form" id="passwordForm">
        <h2 id="passwordTitle">Įveskite slaptažodį</h2>
        <p class="password-hint">Slaptažodį gali pasakyti senelis arba močiutė.</p>
        <label class="password-label" for="passwordInput">Šeimos slaptažodis</label>
        <input
          autocomplete="one-time-code"
          class="password-input"
          id="passwordInput"
          inputmode="numeric"
          name="password"
          required
          type="password"
        >
        <p class="password-error" id="passwordError" role="alert"></p>
        <div class="password-actions">
          <button class="secondary-button" id="cancelPassword" type="button">
            Atšaukti
          </button>
          <button class="confirm-button" type="submit">Prisijungti</button>
        </div>
      </form>
    </div>

    <script src="script.js?v=20260614-1624"></script>
  </body>
</html>
