<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Чат с дедушкой</title>
    <meta
      name="description"
      content="Простой семейный видеочат для дедушки и внуков."
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <section class="welcome" id="welcome">
        <div class="brand">
          <p class="eyebrow">Семейная комната</p>
          <h1>Чат с дедушкой</h1>
          <p class="subtitle">Выбери, кому позвонить, и введи семейный пароль.</p>
        </div>

        <div class="call-options" aria-label="Выбор звонка">
          <button
            class="call-button"
            type="button"
            data-call-target="grandpa"
          >
            Позвонить дедушке
          </button>
          <button
            class="call-button call-button-alt"
            type="button"
            data-call-target="grandma"
          >
            Позвонить бабушке
          </button>
        </div>
      </section>

      <section class="call is-hidden" id="call" aria-label="Видеозвонок">
        <div class="call-bar">
          <strong id="callTitle">Чат с дедушкой</strong>
          <button class="secondary-button" id="leaveCall" type="button">
            Завершить
          </button>
        </div>
        <div class="meet" id="meet"></div>
      </section>
    </main>

    <dialog class="password-dialog" id="passwordDialog">
      <form class="password-form" id="passwordForm" method="dialog">
        <h2 id="passwordTitle">Введите пароль</h2>
        <p class="password-hint">Пароль можно узнать у дедушки или бабушки.</p>
        <label class="password-label" for="passwordInput">Семейный пароль</label>
        <input
          autocomplete="one-time-code"
          class="password-input"
          id="passwordInput"
          inputmode="numeric"
          name="password"
          required
          type="password"
        >
        <p class="password-error" id="passwordError" role="alert"></p>
        <div class="password-actions">
          <button class="secondary-button" id="cancelPassword" type="button">
            Отмена
          </button>
          <button class="confirm-button" type="submit">Войти</button>
        </div>
      </form>
    </dialog>

    <script src="https://meet.jit.si/external_api.js"></script>
    <script src="script.js"></script>
  </body>
</html>
